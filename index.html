<!DOCTYPE html>
<html>

<head>

<title>Global Conflict Monitor</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>

<link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

html, body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

#globe{
width:100%;
height:100vh;
}

.panel{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:5px;
}

</style>

</head>

<body>

<div id="globe"></div>

<div class="panel">

<h3>War Statistics</h3>

Iran casualties: <span id="iran"></span><br>
US casualties: <span id="us"></span><br>
Missiles fired: <span id="missiles"></span>

</div>

<script src="js/dashboard.js"></script>

</body>

</html>
